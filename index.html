<title>The Billion Club</title>
<style>
  :root {
    --bg: #0e1013;
    --panel: #16181c;
    --panel-2: #1b1e23;
    --text: #ece7dc;
    --muted: #8d9096;
    --line: rgba(236, 231, 220, 0.1);
    --accent: #ff6a39;
    --accent-dim: rgba(255, 106, 57, 0.16);
    --good: #4fae6d;
    --good-dim: rgba(79, 174, 109, 0.14);
    --bad: #d65b5b;
    --bad-dim: rgba(214, 91, 91, 0.14);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 48px 20px 80px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
  }

  .stage {
    width: 100%;
    max-width: 620px;
  }

  header.top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .brand {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .brand span { color: var(--accent); }

  .score {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .score b { color: var(--text); font-weight: 600; }

  .progress {
    display: flex;
    gap: 5px;
    margin-bottom: 36px;
  }
  .progress i {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: var(--line);
    display: block;
    transition: background 0.4s ease;
  }
  .progress i.done { background: var(--accent); }
  .progress i.right { background: var(--good); }
  .progress i.wrong { background: var(--bad); }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 40px 36px 36px;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 18px;
  }

  .track {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-weight: 700;
    font-size: 30px;
    line-height: 1.22;
    margin: 0 0 6px;
    text-wrap: balance;
  }

  .artist {
    font-size: 17px;
    color: var(--muted);
    margin: 0 0 32px;
  }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 8px;
  }

  button.choice {
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px 12px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }
  button.choice:hover:not(:disabled) {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  button.choice:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  button.choice:disabled { cursor: default; }
  button.choice.pick-right {
    background: var(--good-dim);
    border-color: var(--good);
    color: var(--good);
  }
  button.choice.pick-wrong {
    background: var(--bad-dim);
    border-color: var(--bad);
    color: var(--bad);
  }
  button.choice.fade { opacity: 0.4; }

  .reveal {
    margin-top: 30px;
    padding-top: 28px;
    border-top: 1px solid var(--line);
    display: none;
  }
  .reveal.show { display: block; }

  .verdict {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 20px;
  }
  .verdict.right { color: var(--good); }
  .verdict.wrong { color: var(--bad); }

  .count {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 40px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .count-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 2px 0 20px;
  }

  .meter {
    position: relative;
    height: 8px;
    background: var(--panel-2);
    border-radius: 4px;
    margin: 6px 0 28px;
    overflow: visible;
  }
  .meter-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 1.1s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .meter-line {
    position: absolute;
    top: -5px;
    bottom: -5px;
    width: 2px;
    background: var(--text);
    left: var(--line-pos, 50%);
  }

  .meter-caption {
    display: flex;
    justify-content: space-between;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.02em;
    margin-top: 8px;
  }

  .margin-note {
    font-size: 13px;
    color: var(--muted);
    margin: 26px 0 0;
  }

  button.next {
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 13px 22px;
    margin-top: 26px;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  button.next:hover { opacity: 0.88; }
  button.next:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

  .result .track { font-size: 44px; }
  .result .tier { color: var(--accent); }
  .result .artist { margin-bottom: 26px; }

  footer.credit {
    margin-top: 28px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  @media (max-width: 480px) {
    body { padding: 28px 14px 56px; }
    header.top { margin-bottom: 22px; }
    .progress { margin-bottom: 26px; }
    .card { padding: 28px 20px 24px; border-radius: 12px; }
    .track { font-size: 24px; }
    .result .track { font-size: 34px; }
    .artist { font-size: 15px; margin-bottom: 26px; }
    .choices { grid-template-columns: 1fr; }
    button.choice { padding: 16px 12px; }
    .count { font-size: 32px; }
  }
</style>

  const QUESTION_COUNT = 10;
  const BILLION = 1000000000;
  const SCALE_MIN = 6.5e8;
  const SCALE_MAX = 5.6e9;

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function pickQuestions() {
    const above = shuffle(POOL.filter((s) => s.streams >= BILLION));
    const below = shuffle(POOL.filter((s) => s.streams < BILLION));
    const minEach = 4;
    const guaranteed = above.slice(0, minEach).concat(below.slice(0, minEach));
    const used = new Set(guaranteed.map((s) => s.artist + s.title));
    const rest = shuffle(POOL.filter((s) => !used.has(s.artist + s.title)));
    const filler = rest.slice(0, QUESTION_COUNT - guaranteed.length);
    return shuffle(guaranteed.concat(filler));
  }

  let QUESTIONS = pickQuestions();
  let idx = 0;
  let score = 0;
  let answered = false;
  let results = new Array(QUESTIONS.length).fill(null);

  const card = document.getElementById("card");
  const progressEl = document.getElementById("progress");
  const scoreVal = document.getElementById("scoreVal");

  function fmt(n) {
    return n.toLocaleString("en-US");
  }

  function logPct(value) {
    const p = (Math.log10(value) - Math.log10(SCALE_MIN)) / (Math.log10(SCALE_MAX) - Math.log10(SCALE_MIN));
    return Math.max(0, Math.min(100, p * 100));
  }

  function renderProgress() {
    progressEl.innerHTML = "";
    for (let i = 0; i < QUESTIONS.length; i++) {
      const seg = document.createElement("i");
      if (results[i] === "right") seg.className = "right";
      else if (results[i] === "wrong") seg.className = "wrong";
      else if (i < idx) seg.className = "done";
      progressEl.appendChild(seg);
    }
  }

  function renderQuestion() {
    answered = false;
    const q = QUESTIONS[idx];
    card.innerHTML = `
      <p class="eyebrow">Question ${idx + 1} of ${QUESTIONS.length}</p>
      <p class="track">${q.title}</p>
      <p class="artist">${q.artist}</p>
      <div class="choices">
        <button class="choice" data-side="over">Over a billion</button>
        <button class="choice" data-side="under">Under a billion</button>
      </div>
      <div class="reveal" id="reveal">
        <p class="verdict" id="verdict"></p>
        <div class="count" id="count">0</div>
        <p class="count-label">Total Spotify streams</p>
        <div class="meter">
          <div class="meter-fill" id="meterFill"></div>
          <div class="meter-line" id="meterLine"></div>
        </div>
        <div class="meter-caption"><span>650M</span><span>1,000,000,000 streams</span><span>5.6B</span></div>
        <p class="margin-note" id="marginNote"></p>
        <button class="next" id="nextBtn"></button>
      </div>
    `;
    card.querySelectorAll(".choice").forEach((btn) => {
      btn.addEventListener("click", () => choose(btn.dataset.side));
    });
  }

  function choose(side) {
    if (answered) return;
    answered = true;
    const q = QUESTIONS[idx];
    const actualSide = q.streams >= BILLION ? "over" : "under";
    const isRight = side === actualSide;
    results[idx] = isRight ? "right" : "wrong";
    if (isRight) score++;
    scoreVal.textContent = score;
    renderProgress();

    card.querySelectorAll(".choice").forEach((btn) => {
      btn.disabled = true;
      if (btn.dataset.side === side) {
        btn.classList.add(isRight ? "pick-right" : "pick-wrong");
      } else if (btn.dataset.side === actualSide) {
        btn.classList.add("pick-right");
      } else {
        btn.classList.add("fade");
      }
    });

    const verdict = document.getElementById("verdict");
    verdict.textContent = isRight ? "Correct." : "Not quite.";
    verdict.className = "verdict " + (isRight ? "right" : "wrong");

    document.getElementById("meterLine").style.setProperty("--line-pos", logPct(BILLION) + "%");

    const margin = Math.abs(q.streams - BILLION);
    const marginNote = document.getElementById("marginNote");
    if (margin < 40000000) {
      marginNote.textContent =
        (q.streams >= BILLION ? "Just " : "Just ") +
        fmt(margin) +
        (q.streams >= BILLION ? " streams over the line" : " streams short of the line") +
        " — one of the closest calls in the club.";
    } else {
      marginNote.textContent =
        q.streams >= BILLION
          ? fmt(margin) + " streams clear of the billion mark."
          : fmt(margin) + " streams short of the billion mark.";
    }

    const nextBtn = document.getElementById("nextBtn");
    nextBtn.textContent = idx === QUESTIONS.length - 1 ? "See results" : "Next question";
    nextBtn.addEventListener("click", () => {
      idx++;
      if (idx >= QUESTIONS.length) renderResults();
      else renderQuestion();
    });

    const reveal = document.getElementById("reveal");
    reveal.classList.add("show");

    const countEl = document.getElementById("count");
    const fillEl = document.getElementById("meterFill");
    const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const target = q.streams;
    const targetPct = logPct(target);

    if (prefersReduced) {
      countEl.textContent = fmt(target);
      fillEl.style.width = targetPct + "%";
    } else {
      requestAnimationFrame(() => {
        fillEl.style.width = targetPct + "%";
      });
      const duration = 1100;
      const start = performance.now();
      function tick(now) {
        const t = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - t, 3);
        countEl.textContent = fmt(Math.round(target * eased));
        if (t < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }
  }

  function tier(s) {
    if (s <= 3) return "Casual listener";
    if (s <= 6) return "Certified fan";
    if (s <= 8) return "Chart watcher";
    return "Streaming savant";
  }

  function renderResults() {
    card.innerHTML = `
      <div class="result">
        <p class="eyebrow">Final score</p>
        <p class="track">${score} / ${QUESTIONS.length}</p>
        <p class="artist tier">${tier(score)}</p>
        <button class="next" id="replayBtn">Play again</button>
      </div>
    `;
    document.getElementById("replayBtn").addEventListener("click", () => {
      QUESTIONS = pickQuestions();
      idx = 0;
      score = 0;
      results = new Array(QUESTIONS.length).fill(null);
      scoreVal.textContent = "0";
      renderProgress();
      renderQuestion();
    });
  }

  renderProgress();
  renderQuestion();
</script>
